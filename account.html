<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="header">
      <div class="container header_container">
        <a class="logotype">PRO <span class="logo">AUTO</span></a>
        <nav class="header_nav">
          <ul class="nav_list list-reset">
            <li><a href="index.html#index" class="nav_link">Главная</a></li>
            <li>
              <a href="services.html#services" class="nav_link"
                >Услуги&Запись</a
              >
            </li>
            <li><a href="shop.html#shop" class="nav_link">Магазин&ОПТ</a></li>
            <li>
              <a href="contacts.html#contacts" class="nav_link">Контакты</a>
            </li>
          </ul>
        </nav>
        <a href="#" class="header_account">Личный кабинет</a>
      </div>
    </header>

    <main class="main">
      <section class="account">
        <div class="container">
          <div class="account_content content_left">
            <h2 class="services_title account_title">
              Личный<span class="services_subtitle"> кабинет</span>
            </h2>
            <div class="main_block">
              <aside class="sidebar">
                <div class="account_avatar">И</div>
                <p class="avatar_name">Иван Иванов</p>
                <p class="avatar_skills">Оптовый клиент (Скидка 15%)</p>

                <ul class="account_list list-reset">
                  <li class="account_item">
                    <a href="#" class="account_link">История обслуживания</a>
                  </li>
                  <li class="account_item">
                    <a href="#" class="account_link">Заказы запчастей</a>
                  </li>
                  <li class="account_item">
                    <a href="#" class="account_link">Мои автомобили</a>
                  </li>
                  <li class="account_item">
                    <a href="#" class="account_link">Настройки профиля </a>
                  </li>
                  <li class="account_item">
                    <a href="#" class="account_link account_exit">Выйти </a>
                  </li>
                </ul>
              </aside>
              <div class="main_box">
                <h2 class="main_box-title">Настройки профиля</h2>
                <div class="personal_info">
                  <h3 class="personal_info-title">Личные данные</h3>
                  <form action="#">
                    <div class="form_rows">
                      <div class="form_group">
                        <label class="lable_name personal_name" for="name"
                          >ФИО</label
                        >
                        <input
                          class="input_row"
                          type="name"
                          name="name"
                          placeholder="Иванов Иван Иванович"
                        />
                      </div>
                      <div class="form_group">
                        <label class="lable_name personal_name" for="phone"
                          >Телефон</label
                        >
                        <input
                          class="input_row"
                          type="tel"
                          name="phone"
                          placeholder="+7(999) 567 78 99"
                        />
                      </div>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
